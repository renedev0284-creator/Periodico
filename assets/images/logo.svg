<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 114" role="img" aria-label="El Diario — Escudo de El Salvador">
  <defs>
    <clipPath id="shield-clip">
      <path d="M8,5 L92,5 L92,66 Q92,101 50,112 Q8,101 8,66 Z"/>
    </clipPath>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001A40"/>
      <stop offset="100%" stop-color="#003080"/>
    </linearGradient>
    <linearGradient id="sea-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F4C9A"/>
      <stop offset="100%" stop-color="#083070"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M8,5 L92,5 L92,66 Q92,101 50,112 Q8,101 8,66 Z" fill="url(#sky-grad)"/>

  <!-- Sea / ocean base -->
  <path d="M8,76 Q30,71 50,76 Q70,81 92,76 L92,112 Q50,124 8,112 Z"
        fill="url(#sea-grad)" clip-path="url(#shield-clip)"/>

  <!-- Wave line on sea -->
  <path d="M10,78 Q22,75 34,78 Q46,81 58,78 Q70,75 90,78"
        fill="none" stroke="#C8A951" stroke-width="0.7" opacity="0.55" clip-path="url(#shield-clip)"/>

  <!-- 5 Volcanoes — left to right, center tallest -->
  <!-- Far left -->
  <polygon points="13,76 19,61 25,76" fill="#E8E8E8" opacity="0.7" clip-path="url(#shield-clip)"/>
  <!-- Left-center -->
  <polygon points="23,76 32,55 41,76" fill="white" opacity="0.88" clip-path="url(#shield-clip)"/>
  <!-- Center (tallest) -->
  <polygon points="39,76 50,42 61,76" fill="white" clip-path="url(#shield-clip)"/>
  <!-- Right-center -->
  <polygon points="59,76 68,55 77,76" fill="white" opacity="0.88" clip-path="url(#shield-clip)"/>
  <!-- Far right -->
  <polygon points="75,76 81,61 87,76" fill="#E8E8E8" opacity="0.7" clip-path="url(#shield-clip)"/>

  <!-- Golden snow caps -->
  <polygon points="17,65 19,61 21,65"  fill="#C8A951" opacity="0.9" clip-path="url(#shield-clip)"/>
  <polygon points="29,59 32,55 35,59"  fill="#C8A951" opacity="0.9" clip-path="url(#shield-clip)"/>
  <polygon points="47,47 50,42 53,47"  fill="#C8A951"               clip-path="url(#shield-clip)"/>
  <polygon points="65,59 68,55 71,59"  fill="#C8A951" opacity="0.9" clip-path="url(#shield-clip)"/>
  <polygon points="79,65 81,61 83,65"  fill="#C8A951" opacity="0.9" clip-path="url(#shield-clip)"/>

  <!-- Golden rainbow / arc of liberty (two strokes) -->
  <path d="M20,70 Q50,46 80,70"
        fill="none" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round" clip-path="url(#shield-clip)"/>
  <path d="M23,73.5 Q50,52 77,73.5"
        fill="none" stroke="#C8A951" stroke-width="1.4" stroke-linecap="round" opacity="0.45" clip-path="url(#shield-clip)"/>

  <!-- Sun — radiating at apex (inside triangle) -->
  <!-- Outer glow ring -->
  <circle cx="50" cy="25" r="11.5" fill="#C8A951" opacity="0.2" clip-path="url(#shield-clip)"/>
  <!-- Sun body -->
  <circle cx="50" cy="25" r="8.5"  fill="#C8A951" clip-path="url(#shield-clip)"/>
  <!-- Inner dark center -->
  <circle cx="50" cy="25" r="5.5"  fill="#001A40" clip-path="url(#shield-clip)"/>
  <!-- Inner gold dot -->
  <circle cx="50" cy="25" r="2.5"  fill="#C8A951" clip-path="url(#shield-clip)"/>

  <!-- Sun rays (8 directions) -->
  <g stroke="#C8A951" stroke-width="1.5" stroke-linecap="round" clip-path="url(#shield-clip)">
    <line x1="50" y1="12"  x2="50" y2="9"/>
    <line x1="57.8" y1="14.2" x2="59.9" y2="12.1"/>
    <line x1="62"   y1="22.5" x2="65"   y2="21"/>
    <line x1="57.8" y1="35.8" x2="59.9" y2="37.9"/>
    <line x1="42.2" y1="14.2" x2="40.1" y2="12.1"/>
    <line x1="38"   y1="22.5" x2="35"   y2="21"/>
    <line x1="42.2" y1="35.8" x2="40.1" y2="37.9"/>
  </g>

  <!-- Equality triangle (subtle) -->
  <polygon points="50,18 82,88 18,88"
           fill="none" stroke="#C8A951" stroke-width="0.9" opacity="0.28" clip-path="url(#shield-clip)"/>

  <!-- Gold outer border -->
  <path d="M8,5 L92,5 L92,66 Q92,101 50,112 Q8,101 8,66 Z"
        fill="none" stroke="#C8A951" stroke-width="2.8"/>

  <!-- Gold inner border (thin) -->
  <path d="M12,8.5 L88,8.5 L88,65 Q88,97 50,108 Q12,97 12,65 Z"
        fill="none" stroke="#C8A951" stroke-width="0.9" opacity="0.45"/>

  <!-- Tiny 5 stars at top of shield, inside (representing 5 depts / Central America) -->
  <!-- Star helper: 5-point star centered at given coords, size ~3px -->
  <!-- Left star -->
  <polygon points="22,14 22.7,16.2 25,16.2 23.2,17.5 23.9,19.7 22,18.4 20.1,19.7 20.8,17.5 19,16.2 21.3,16.2"
           fill="#C8A951" opacity="0.75" transform="scale(0.7) translate(10,4)"/>
  <!-- Right star -->
  <polygon points="22,14 22.7,16.2 25,16.2 23.2,17.5 23.9,19.7 22,18.4 20.1,19.7 20.8,17.5 19,16.2 21.3,16.2"
           fill="#C8A951" opacity="0.75" transform="scale(0.7) translate(76,4)"/>
</svg>
