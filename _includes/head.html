<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- SEO: jekyll-seo-tag genera title, description, og:, twitter: -->
{% seo %}

<!-- Canonical -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- RSS Feed -->
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} — Feed" href="{{ site.feed.path | default: 'feed.xml' | absolute_url }}">

<!-- Sitemap -->
<link rel="sitemap" type="application/xml" title="Sitemap" href="{{ '/sitemap.xml' | absolute_url }}">

<!-- Preconnect Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Tipografía periodística: Playfair Display (titulares) + Source Serif 4 (cuerpo) + Inter (UI) -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Estilos principales -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Theme color — Azul marino El Salvador -->
<meta name="theme-color" content="#00356E">

<!-- Open Graph adicional (complementa jekyll-seo-tag) -->
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="{{ site.locale | default: 'es_ES' }}">
{% if page.layout == "post" %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
{% if page.author %}<meta property="article:author" content="{{ page.author }}">{% endif %}
{% for cat in page.categories %}
<meta property="article:section" content="{{ cat }}">
{% endfor %}
{% for tag in page.tags %}
<meta property="article:tag" content="{{ tag }}">
{% endfor %}
{% endif %}
