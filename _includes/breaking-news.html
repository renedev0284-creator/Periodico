{% assign breaking_posts = site.posts | where: "breaking", true | limit: 6 %}
{% if breaking_posts.size > 0 %}
<div class="breaking-news" role="region" aria-label="Última hora" aria-live="polite">
  <div class="breaking-news__inner">
    <span class="breaking-news__label" aria-hidden="true">
      <span class="breaking-news__dot"></span>
      ÚLTIMA HORA
    </span>
    <div class="breaking-news__ticker-wrap" aria-label="Noticias de última hora">
      <ul class="breaking-news__ticker" id="breaking-ticker">
        {% for post in breaking_posts %}
        <li class="breaking-news__item">
          {% if post.categories.first %}
          <span class="breaking-news__cat">{{ post.categories.first | capitalize }}</span>
          {% endif %}
          <a href="{{ post.url | relative_url }}" class="breaking-news__link">{{ post.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
    <button class="breaking-news__close" aria-label="Cerrar última hora" id="bn-close">✕</button>
  </div>
</div>
{% endif %}
