<!-- Cookie Consent Banner -->
<div class="cookie-banner" id="cookie-banner" role="dialog" aria-modal="true" aria-label="Aviso de cookies" aria-hidden="true">
  <div class="cookie-banner__inner">

    <div class="cookie-banner__content">
      <div class="cookie-banner__icon" aria-hidden="true">🍪</div>
      <div class="cookie-banner__text">
        <p class="cookie-banner__title">Usamos cookies</p>
        <p class="cookie-banner__desc">
          Utilizamos cookies esenciales para el funcionamiento del sitio, cookies de análisis y, cuando aplica,
          cookies de Amazon Associates para medir el rendimiento de enlaces de afiliado.
          Puedes aceptar todas o solo las esenciales. Lee nuestra
          <a href="{{ '/politica-de-privacidad/' | relative_url }}" class="cookie-banner__link">Política de Privacidad</a>.
        </p>
      </div>
    </div>

    <div class="cookie-banner__actions">
      <button class="cookie-banner__btn cookie-banner__btn--reject" id="cookie-reject" type="button">
        Solo esenciales
      </button>
      <button class="cookie-banner__btn cookie-banner__btn--accept" id="cookie-accept" type="button">
        Aceptar todo
      </button>
    </div>

  </div>
</div>
