---
layout: default
---

<article class="page-content">
  <header class="page-content__header">
    <div class="container container--narrow">
      <nav class="page-content__breadcrumb" aria-label="Ruta de navegación">
        <a href="{{ '/' | relative_url }}">Portada</a>
        <span aria-hidden="true"> / </span>
        <span>{{ page.title }}</span>
      </nav>
      <h1 class="page-content__title">{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="page-content__subtitle">{{ page.subtitle }}</p>
      {% endif %}
      {% if page.last_updated %}
      <p class="page-content__updated">
        Última actualización:
        <time datetime="{{ page.last_updated }}">{{ page.last_updated | date: "%-d de %B de %Y" }}</time>
      </p>
      {% endif %}
    </div>
  </header>

  <div class="container container--narrow">
    <div class="page-body article-body">
      {{ content }}
    </div>
  </div>
</article>

<style>
.page-content__header {
  background: {{ '$color-bg-alt' | default: '#f2f5fa' }};
  padding: 2.5rem 0 2rem;
  margin-bottom: 2.5rem;
  border-bottom: 3px solid #00356E;
}
.page-content__breadcrumb {
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  color: #5a7a9e;
  margin-bottom: 1rem;
  a { color: #5a7a9e; text-decoration: underline; }
}
.page-content__title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(1.875rem, 4vw, 2.8rem);
  font-weight: 900;
  color: #00356E;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.page-content__subtitle {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 1.125rem;
  color: #5a7a9e;
  line-height: 1.5;
}
.page-content__updated {
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  color: #8fa8c4;
  margin-top: 0.75rem;
}
.page-body { padding-bottom: 4rem; }
</style>
