# Configuración editorial y visual
# Personaliza el comportamiento y apariencia del periódico

# --- Portada ---
homepage:
  hero_count: 1           # Artículos en el hero principal
  featured_count: 3       # Artículos destacados secundarios
  latest_count: 6         # Artículos en sección "Lo último"
  show_breaking: true     # Mostrar ticker de última hora
  show_sidebar: true      # Mostrar barra lateral
  show_newsletter: true   # Mostrar formulario de boletín

# --- Artículos ---
article:
  show_reading_time: true
  show_related: true
  related_count: 3
  show_author_bio: true
  show_share_buttons: true
  show_tags: true
  show_progress_bar: true  # Barra de progreso de lectura

# --- Sidebar ---
sidebar:
  trending_count: 5       # Artículos más leídos

# --- Anuncios (dejar vacío para desactivar) ---
ads:
  header_banner: ""       # URL del banner de cabecera
  sidebar_box: ""         # URL del anuncio del sidebar
  article_mid: ""         # URL del anuncio a mitad del artículo

# --- Newsletter ---
newsletter:
  active: true
  provider: "mailerlite"
  action_url: "https://assets.mailerlite.com/jsonp/2151165/forms/180691016168244281/subscribe"
  title: "Mantente informado"
  description: "Recibe cada mañana las noticias más importantes directamente en tu correo."

# --- Clima y ubicación (burbujas del topbar) ---
weather:
  city: "San Salvador"    # Nombre que se muestra en la burbuja ciudad
  lat: 13.6929            # Latitud de la ciudad
  lon: -89.2182           # Longitud de la ciudad

# --- Google Analytics ---
google_analytics: ""      # Tu ID de Google Analytics (G-XXXXXXXXXX)

# --- Apoyo del lector (PayPal) ---
support:
  active: true
  paypal_email: "rene0284@msn.com"
  label: "Apoya el periodismo libre"    # Texto del enlace/botón

# --- Comentarios ---
comments:
  active: false
  provider: ""            # "disqus", "utterances"
  disqus_shortname: ""

# --- Video pre-roll publicitario ---
# Cuando enabled: true, el video aparece colapsado y muestra un anuncio
# durante N segundos antes de reproducirse. Ideal para monetización.
video_ad:
  enabled: false          # true para activar el pre-roll en todos los videos
  duration: 7             # Segundos que dura el anuncio antes de mostrar el video
  skip_after: 3           # Segundos tras los que aparece el botón "Saltar"
  ad_label: "Publicidad"  # Etiqueta del anuncio
  # --- Datos del patrocinador (dejar vacío = muestra banner "Tu marca aquí") ---
  sponsor_name: ""        # Nombre de la marca (ej: "Banco Agrícola")
  sponsor_url: ""         # URL de destino (ej: "https://bancoagricola.com")
  sponsor_logo: ""        # Logo del patrocinador (ej: /assets/images/ads/logo-marca.png)
  sponsor_tagline: ""     # Mensaje de la marca (ej: "El banco que te acompaña")
  ad_image: ""            # Imagen principal del anuncio (reemplaza logo+tagline si se usa)
